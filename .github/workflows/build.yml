name: Build Probaho Browser

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        run: build-browser.bat

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: probaho-browser-build
          path: .
